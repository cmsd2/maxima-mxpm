name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
            extra-args: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
            extra-args: "--features vendored-openssl"
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
            extra-args: "--features vendored-openssl"
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
            extra-args: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
            extra-args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release --locked --target ${{ matrix.target }} ${{ matrix.extra-args }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mxpm-${{ matrix.target }}.tar.gz mxpm
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../mxpm-${{ matrix.target }}.zip mxpm.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: mxpm-${{ matrix.target }}
          path: mxpm-${{ matrix.target }}.*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: mxpm-*
          generate_release_notes: true
